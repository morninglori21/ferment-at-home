<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>您的披薩 — Ferment at Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&family=Noto+Sans+TC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="result.css">
</head>
<body>

  <!-- ===== TOP NAV ===== -->
  <header class="top-nav">
    <div class="container nav-inner">
      <a href="index.html" class="logo">
        <img class="logo-pizza" src="https://www.figma.com/api/mcp/asset/8552024e-d773-4929-8283-dfba99926c7b" alt="Pizza icon">
        <img class="logo-text" src="https://www.figma.com/api/mcp/asset/a52e12a7-e983-4898-8b2b-3f5bc960c703" alt="Ferment at Home">
      </a>
      <nav class="main-menu">
        <a href="shop.html" class="nav-link">商品列表</a>
        <a href="brand-story.html" class="nav-link">品牌故事</a>
        <a href="faq.html" class="nav-link">常見問題</a>
        <a href="#" class="btn-primary">登入/註冊</a>
      </nav>
    </div>
  </header>

  <main class="result-main">
    <div class="container result-container">

      <!-- Back button -->
      <a href="shop.html" class="result-back">
        <img src="https://www.figma.com/api/mcp/asset/b52f7eef-f5d0-4fc4-bfbf-9f4eaa09dfdf" alt="">
        重新生成
        <img src="https://www.figma.com/api/mcp/asset/931bccfc-72ee-443d-94fb-b6287665e3d9" alt="">
      </a>

      <!-- Title -->
      <div class="section-title">
        <h2>Your Pizza</h2>
        <div class="section-title-line">
          <img src="https://www.figma.com/api/mcp/asset/c0bc2ad1-f99f-4162-9c23-3c267dc09231" alt="">
        </div>
      </div>

      <!-- Cart layout -->
      <div class="result-cart">

        <!-- LEFT: Pizza image + summary cards -->
        <div class="result-left">
          <!-- Pizza image -->
          <div class="result-pizza-wrap">
            <img class="result-pizza-img" src="https://www.figma.com/api/mcp/asset/9256c881-3b89-4200-9482-b64b758b51af" alt="Your Pizza">
          </div>

          <!-- Selected items row -->
          <div class="result-items" id="result-items">
            <!-- filled by JS -->
          </div>

          <!-- Combo card -->
          <div class="result-combo" id="result-combo">
            <!-- filled by JS -->
          </div>
        </div>

        <!-- RIGHT: Total price card -->
        <div class="result-right">
          <p class="result-total-title">Total</p>
          <div class="result-price-list" id="result-price-list">
            <!-- filled by JS -->
          </div>
          <div class="result-divider"></div>
          <div class="result-total-row">
            <span class="result-total-label">總計</span>
            <span class="result-total-amount" id="result-total-amount">NT$ 0</span>
          </div>
          <button class="result-add-cart">
            <img src="https://www.figma.com/api/mcp/asset/9ba6acb1-f74d-47d1-9963-1a0d2d44e689" alt="">
            加入購物車
          </button>
        </div>

      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container">
      <div class="footer-logo">
        <img class="footer-logo-pizza" src="https://www.figma.com/api/mcp/asset/e5674549-e52b-4872-af9b-56e2596138f9" alt="Pizza icon">
        <img class="footer-logo-text" src="https://www.figma.com/api/mcp/asset/ee4c65e0-4473-428b-ae82-0670eeca9c1c" alt="Ferment at Home">
      </div>
      <div class="footer-bottom">
        <nav class="footer-menu">
          <a href="shop.html" class="footer-link">商品列表</a>
          <a href="brand-story.html" class="footer-link">品牌故事</a>
          <a href="faq.html" class="footer-link">常見問題</a>
        </nav>
        <p class="footer-copyright">© 2025 Ferment at Home Inc. All Rights Reserved.</p>
        <nav class="footer-menu">
          <a href="#" class="footer-link">隱私權政策</a>
          <a href="#" class="footer-link">使用者條款</a>
        </nav>
      </div>
    </div>
  </footer>

  <button class="btn-back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到頂端">
    <img src="https://www.figma.com/api/mcp/asset/60972d6b-d675-4b3a-b66f-396e0f0338f4" alt="">
  </button>

  <script>
    const LABEL_MAP = {
      sauce:  '醬料',
      size:   '尺寸',
      crust:  '餅皮',
      cheese: '起司',
      combo:  '配料組合',
    };
    const BASE = 200;

    const raw = localStorage.getItem('pizzaOrder');
    const order = raw ? JSON.parse(raw) : null;

    if (order) {
      const { selections, total } = order;

      /* ── Selected item mini-cards (sauce / size / crust / cheese) ── */
      const itemsEl = document.getElementById('result-items');
      ['sauce','size','crust','cheese'].forEach(key => {
        if (!selections[key]) return;
        const { name, img } = selections[key];
        itemsEl.innerHTML += `
          <div class="result-item-card">
            <div class="result-item-img"><img src="${img}" alt="${name}"></div>
            <p class="result-item-name">${name}</p>
          </div>`;
      });

      /* ── Combo card ── */
      const comboEl = document.getElementById('result-combo');
      if (selections.combo) {
        const { name } = selections.combo;
        comboEl.innerHTML = `
          <div class="result-combo-name">${name}</div>`;
      }

      /* ── Price breakdown ── */
      const priceEl = document.getElementById('result-price-list');
      let html = `
        <div class="result-price-row">
          <span>基本價格</span><span>NT$ ${BASE}</span>
        </div>`;

      Object.entries(selections).forEach(([key, val]) => {
        const label = LABEL_MAP[key] || key;
        let desc = val.name;
        html += `
          <div class="result-price-group">
            <span class="result-price-cat">${label}</span>
            <div class="result-price-row">
              <span>${desc}</span>
              <span>NT$ ${val.price}</span>
            </div>
          </div>`;
      });

      priceEl.innerHTML = html;
      document.getElementById('result-total-amount').textContent = `NT$ ${total.toLocaleString()}`;
    } else {
      /* No order data — show defaults */
      document.getElementById('result-total-amount').textContent = 'NT$ 200';
    }

    /* ── 加入購物車 → 導向 cart.html ── */
    document.querySelector('.result-add-cart').addEventListener('click', () => {
      if (order) {
        const pending = {
          name: '自訂披薩',
          size: order.selections?.size?.name || '',
          basePrice: order.total,
          qty: 1,
          imgSrc: 'https://www.figma.com/api/mcp/asset/9256c881-3b89-4200-9482-b64b758b51af'
        };
        sessionStorage.setItem('pendingCartItem', JSON.stringify(pending));
      }
      window.location.href = 'cart.html';
    });
  </script>

</body>
</html>
